# Definición del servidor MCP: Linear
# Este archivo es declarativo y versionable. NO contiene secretos.

DISPLAY_NAME="Linear"

# Método de autenticación: token | oauth
AUTH_TYPE="token"

# Nombre(s) de la(s) variable(s) de entorno que necesita el servidor.
# Solo el NOMBRE, nunca el valor.
ENV_VARS="LINEAR_API_KEY"

# Comando para lanzar/registrar el servidor MCP (ajústalo a tu runtime).
INSTALL_CMD="npx -y mcp-remote https://mcp.linear.app/sse"

# Dónde obtener la credencial (se muestra al usuario durante la config).
AUTH_URL="https://linear.app/settings/api"

# Pista para el usuario.
AUTH_HINT="Genera un Personal API key en Linear > Settings > Security & access > API y pégalo aquí."
