# Definición del servidor MCP: Sentry
# Este archivo es declarativo y versionable. NO contiene secretos.

DISPLAY_NAME="Sentry"

# Método de autenticación: token | oauth
AUTH_TYPE="oauth"

# Nombre(s) de la(s) variable(s) de entorno que necesita el servidor.
ENV_VARS="SENTRY_ACCESS_TOKEN"

# Comando para lanzar/registrar el servidor MCP (ajústalo a tu runtime).
INSTALL_CMD="npx -y @sentry/mcp-server"

# URL donde se completa el flujo OAuth / se emite el token.
AUTH_URL="https://sentry.io/settings/account/api/auth-tokens/"

# Pista para el usuario (headless: el login se hace en tu máquina local).
AUTH_HINT="Completa el OAuth en tu máquina local (o crea un Auth Token) y pega aquí el token resultante."
